<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Glass Brains 2.0</title>
  <!-- Computer Modern (LaTeX roman) web font for the colorbar ticks; falls back to serif if offline. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column; height: 100vh; }

    #viewer { position: relative; flex: 1; min-height: 0; }
    /* canvas leaves a bottom strip free for the horizontal colorbar (never overlaps a panel).
       Strip height is set from the colorbar size via the --cbstrip variable. */
    canvas { position: absolute; left: 0; top: 0; width: 100%; height: calc(100% - var(--cbstrip, 52px)); }
    body.nobar canvas { height: 100%; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #666; z-index: 10; }

    /* on-screen horizontal colorbar (matches the voxel colours exactly), centred in the bottom strip */
    .colorbar { position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 7px; pointer-events: none; }
    .cbar-row { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .cbar-name { font-size: 9px; color: #555; text-align: center; line-height: 1; }
    .colorbar canvas { position: static; border: 1px solid #d0d0d0; display: block; }
    .colorbar-labels { display: flex; flex-direction: row; justify-content: space-between; font-size: 9px; color: #777; line-height: 1; }
    body.nobar .colorbar { display: none; }

    /* comic SFX toggle (top-right) + the popped images */
    .kapow-toggle { position: absolute; top: 8px; right: 12px; z-index: 20; display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #444; cursor: pointer; user-select: none; background: rgba(255,255,255,0.72);
      padding: 3px 8px; border: 1px solid #e3e3e3; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px; }
    .kapow-fx { position: fixed; pointer-events: none; z-index: 9999; height: auto; transform-origin: center;
      will-change: transform, opacity; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }

    /* control bar — one global surface row + one row per overlay (stacked) */
    #controls { flex: none; display: flex; flex-direction: column; background: #fafafa;
      border-top: 1px solid #e3e3e3; max-height: 46vh; overflow-y: auto; }
    .row { display: flex; align-items: center; gap: 16px; padding: 6px 14px; white-space: nowrap; overflow-x: auto; }
    .row + .row { border-top: 1px solid #ececec; }
    .overlay-row { background: #fcfcfc; }
    .grp { display: flex; align-items: center; gap: 6px; }
    .grp + .grp { border-left: 1px solid #e3e3e3; padding-left: 16px; }
    .lab { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .sw { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .sw span { font-size: 8px; color: #999; }
    input[type=range] { width: 66px; }
    .numbox { width: 46px; margin-top: 2px; font-size: 10px; padding: 1px 3px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
    .numbox::-webkit-inner-spin-button, .numbox::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    select, .btn { font-size: 11px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; }
    .btn { color: #777; }
    .btn.active { background: #444; color: #fff; border-color: #444; }
    .file { position: relative; overflow: hidden; }
    .file input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="loading">Loading brain…</div>
    <canvas id="canvas"></canvas>
    <label class="kapow-toggle" title="Comic SFX: a 50% chance a 'BOOM!' pops where you click."><input type="checkbox" id="c-kapow" checked> Kapow</label>
  </div>
  <div id="controls">
    <!-- Global surface row -->
    <div class="row">
      <div class="grp">
        <label class="btn file">Load NIfTI<input type="file" id="c-upload" accept=".nii,.nii.gz,.gz"></label>
        <select id="c-layout" title="Layout">
          <option value="fourPanel">4-panel</option>
          <option value="ninePanel">9-panel</option>
        </select>
        <button class="btn" id="c-save" title="Save the current view as a high-res PNG">Save PNG</button>
      </div>
      <div class="grp">
        <span class="lab">Surface</span>
        <button class="btn" id="c-inflate">Inflate</button>
        <button class="btn active" id="c-outline">Outline</button>
        <div class="sw"><span>cortex α</span><input type="range" id="c-cortex"></div>
        <div class="sw"><span>edge thr</span><input type="range" id="c-outline-thresh"></div>
        <div class="sw"><span>line w</span><input type="range" id="c-outline-width"></div>
      </div>
      <div class="grp">
        <span class="lab">Light</span>
        <div class="sw"><span>direct</span><input type="range" id="c-directional"></div>
        <div class="sw"><span>ambient</span><input type="range" id="c-ambient"></div>
      </div>
    </div>
    <!-- One row per overlay, generated by bind.js -->
    <div id="overlay-rows"></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    const params = new URLSearchParams(location.search);
    const entry = params.get('headless') === '1' ? './app/headless-entry.js' : './app/browser-main.js';
    import(entry).catch((err) => {
      console.error(err);
      const el = document.getElementById('loading');
      if (el) el.textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
