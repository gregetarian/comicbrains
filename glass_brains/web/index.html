<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>comicbrains — in-browser glass brain</title>
  <!-- Computer Modern (LaTeX roman) web font for the colorbar ticks; falls back to serif if offline. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #fff; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column; height: 100vh; }

    #viewer { position: relative; flex: 1; min-height: 0; }
    canvas { position: absolute; left: 0; top: 0; width: 100%; height: calc(100% - var(--cbstrip, 52px)); }
    body.nobar canvas { height: 100%; }

    /* loading / progress overlay (also used for the one-time Pyodide download) */
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 14px; color: #444; z-index: 10; text-align: center; background: rgba(255,255,255,0.9);
      padding: 14px 20px; border: 1px solid #e3e3e3; border-radius: 6px; max-width: 340px; line-height: 1.5; }
    #loading .sub { font-size: 11px; color: #888; margin-top: 6px; }

    /* title chip (top-left) */
    .title { position: absolute; top: 8px; left: 12px; z-index: 20; font-size: 13px; font-weight: 700;
      color: #333; letter-spacing: 0.3px; background: rgba(255,255,255,0.72); padding: 3px 9px;
      border: 1px solid #e3e3e3; border-radius: 4px; }
    .title span { font-weight: 400; color: #999; font-size: 11px; }

    /* on-screen horizontal colorbar */
    .colorbar { position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 7px; pointer-events: none; }
    /* ✕ to hide the colorbars (the rest of .colorbar is pointer-events:none so it never eats clicks on the brains) */
    .cbar-close { position: absolute; top: -4px; right: -22px; width: 18px; height: 18px; line-height: 1; padding: 0;
      font-size: 11px; border: 1px solid #ddd; border-radius: 3px; background: rgba(255,255,255,0.85); color: #888;
      cursor: pointer; pointer-events: auto; }
    .cbar-close:hover { color: #c0392b; border-color: #bbb; }
    .cbar-row { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .cbar-name { font-size: 9px; color: #555; text-align: center; line-height: 1; }
    .colorbar canvas { position: static; border: 1px solid #d0d0d0; display: block; }
    .colorbar-labels { display: flex; flex-direction: row; justify-content: space-between; font-size: 9px; color: #777; line-height: 1; }
    body.nobar .colorbar { display: none; }

    .kapow-toggle { position: absolute; top: 8px; right: 12px; z-index: 20; display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #444; cursor: pointer; user-select: none; background: rgba(255,255,255,0.72);
      padding: 3px 8px; border: 1px solid #e3e3e3; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px; }
    .kapow-fx { position: fixed; pointer-events: none; z-index: 9999; height: auto; transform-origin: center;
      will-change: transform, opacity; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }

    .panel-zoom { position: absolute; display: flex; gap: 3px; z-index: 15; opacity: 0;
      transition: opacity 0.12s; pointer-events: none; }
    .panel-zoom.show { opacity: 1; pointer-events: auto; }
    .panel-zoom button { width: 21px; height: 21px; font-size: 15px; line-height: 1; padding: 0;
      border: 1px solid #ccc; border-radius: 3px; background: rgba(255,255,255,0.85); color: #444;
      cursor: pointer; font-weight: 600; }
    .panel-zoom button:hover { background: #fff; border-color: #999; }

    #controls { flex: none; display: flex; flex-direction: column; background: #fafafa;
      border-top: 1px solid #e3e3e3; max-height: 46vh; overflow-y: auto; }
    .row { display: flex; align-items: center; gap: 16px; padding: 6px 14px; white-space: nowrap;
      overflow-x: auto; overflow-y: hidden; min-height: 56px; scrollbar-width: thin; }
    .row + .row { border-top: 1px solid #ececec; }
    .overlay-row { background: #fcfcfc; }
    .ov-name { max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    .btn.rm { color: #c0392b; font-weight: 700; padding: 2px 7px; line-height: 1; }
    .grp { display: flex; align-items: center; gap: 6px; }
    .grp + .grp { border-left: 1px solid #e3e3e3; padding-left: 16px; }
    .lab { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .sw { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .sw span { font-size: 8px; color: #999; }
    /* clickable info: parameter labels (above each slider) + a small ⓘ on toggles/selects */
    .sw span.has-info { cursor: help; border-bottom: 1px dotted #bbb; }
    .info { width: 13px; height: 13px; min-width: 13px; padding: 0; margin-left: 4px; font-size: 9px;
      line-height: 11px; border: 1px solid #bbb; border-radius: 50%; background: #fff; color: #888;
      cursor: pointer; font-style: italic; font-family: Georgia, 'Times New Roman', serif; vertical-align: middle; }
    .info:hover { color: #222; border-color: #888; }
    .info-pop { position: fixed; z-index: 9998; max-width: 260px; background: #2b2b2b; color: #fff;
      font-size: 11px; line-height: 1.45; padding: 8px 10px; border-radius: 5px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.32); display: none; }
    .info-pop.show { display: block; }
    input[type=range] { width: 66px; }
    .numbox { width: 46px; margin-top: 2px; font-size: 10px; padding: 1px 3px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
    .numbox::-webkit-inner-spin-button, .numbox::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    select, .btn { font-size: 11px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; }
    .btn { color: #777; }
    .btn.active { background: #444; color: #fff; border-color: #444; }
    .file { position: relative; overflow: hidden; }
    .file input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .thrbox { width: 50px; font-size: 11px; padding: 3px 4px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
  </style>
</head>
<body>
  <div id="viewer">
    <div class="title">comicbrains <span>· in-browser glass brain</span></div>
    <div id="loading">Loading brain…</div>
    <canvas id="canvas"></canvas>
    <label class="kapow-toggle" title="Comic SFX: a 50% chance a 'BOOM!' pops where you click."><input type="checkbox" id="c-kapow" checked> Kapow</label>
  </div>
  <div id="controls">
    <!-- Global surface row -->
    <div class="row">
      <div class="grp">
        <label class="btn file" title="Load one or more NIfTIs — processed in your browser (no upload to any server)">+ NIfTI<input type="file" id="c-upload" accept=".nii,.nii.gz,.gz" multiple></label>
        <div class="sw" title="Bake threshold: voxels with |value| below this are dropped when meshing the upload."><span>threshold</span><input type="number" class="thrbox" id="c-threshold" value="2.3" min="0" step="0.1"></div>
        <select id="c-layout" title="Layout">
          <option value="fourPanel">4-panel</option>
          <option value="ninePanel">9-panel</option>
          <option value="overview">overview</option>
        </select>
        <button class="btn" id="c-save-brain" title="Save the brains at full resolution (no colorbars, never squashed)">Save brain</button>
        <button class="btn" id="c-save-bars" title="Save the colorbars on their own as a separate image">Save bars</button>
        <button class="btn active" id="c-colorbar" title="Show/hide the colorbars in the live view (hiding reclaims the full canvas so the brains aren't squashed)">Colorbar</button>
        <button class="btn" id="c-cli" title="Copy a glass-brains render CLI command that reproduces this view to the clipboard (falls back to a .txt download)">Copy CLI</button>
      </div>
      <div class="grp">
        <span class="lab">Surface</span>
        <button class="btn" id="c-inflate">Inflate</button>
        <button class="btn active" id="c-outline">Outline</button>
        <div class="sw"><span>cortex α</span><input type="range" id="c-cortex"></div>
        <div class="sw"><span>edge thr</span><input type="range" id="c-outline-thresh"></div>
        <div class="sw"><span>line w</span><input type="range" id="c-outline-width"></div>
      </div>
      <div class="grp">
        <span class="lab">Light</span>
        <div class="sw"><span>direct</span><input type="range" id="c-directional"></div>
        <div class="sw"><span>ambient</span><input type="range" id="c-ambient"></div>
      </div>
    </div>
    <!-- One row per overlay, generated by bind.js -->
    <div id="overlay-rows"></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import('./app/main.js').catch((err) => {
      console.error(err);
      const el = document.getElementById('loading');
      if (el) el.textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
